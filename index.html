<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BioDex</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0d1117;
  color:white;
}

header{
  background:#16a34a;
  padding:15px;
  text-align:center;
  font-size:24px;
}

.container{
  padding:15px;
}

.card{
  background:#1f2937;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
}
</style>
</head>

<body>

<header>🐾 BioDex</header>

<div class="container">

<input type="text" id="search" placeholder="Search animal..." style="width:100%;padding:10px;margin-bottom:10px;">

<div id="list"></div>

</div>

<script>
const animals = [
  "Lion 🦁",
  "Tiger 🐯",
  "Elephant 🐘",
  "Dog 🐶",
  "Cat 🐱",
  "Cow 🐄"
];

function show(data){
  const list = document.getElementById("list");
  list.innerHTML = "";
  data.forEach(a=>{
    list.innerHTML += `<div class="card">${a}</div>`;
  });
}

show(animals);

document.getElementById("search").addEventListener("input", function(){
  let value = this.value.toLowerCase();
  let filtered = animals.filter(a => a.toLowerCase().includes(value));
  show(filtered);
});
</script>

</body>
</html>
