<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BioDex</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0d1117;
color:white;
}

header{
background:#16a34a;
padding:18px;
text-align:center;
font-size:30px;
font-weight:bold;
}

.search{
padding:15px;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:12px;
font-size:18px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
padding:15px;
}

.card{
background:#1f2937;
padding:20px;
border-radius:16px;
text-align:center;
font-size:20px;
}
</style>
</head>

<body>

<header>🌿 BioDex</header>

<div class="search">
<input type="text" placeholder="Search Species...">
</div>

<div class="grid">
<div class="card">🦁 Animals</div>
<div class="card">🦅 Birds</div>
<div class="card">🐞 Insects</div>
<div class="card">🐍 Reptiles</div>
<div class="card">🐸 Amphibians</div>
<div class="card">🐟 Fish</div>
<div class="card">🌿 Plants</div>
<div class="card">🍄 Fungi</div>
</div>

</body>
</html>
