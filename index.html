<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BioDex</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0d1117;
  color:white;
}

header{
  background:#16a34a;
  padding:18px;
  text-align:center;
  font-size:30px;
  font-weight:bold;
}

.container{
  padding:15px;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

.card{
  background:#1f2937;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

img{
  width:100%;
  max-width:300px;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<header>🐾 BioDex</header>

<div class="container">

<input type="text" id="search" placeholder="Search animal...">

<input type="file" id="upload" accept="image/*">

<div id="preview"></div>

<div id="list"></div>

</div>

<script>

const animals = [
  "Lion 🦁",
  "Tiger 🐯",
  "Elephant 🐘",
  "Dog 🐶",
  "Cat 🐱",
  "Cow 🐄"
];

// show animals
function show(data){
  const list = document.getElementById("list");
  list.innerHTML = "";
  data.forEach(a=>{
    list.innerHTML += `<div class="card">${a}</div>`;
  });
}
show(animals);

// search
document.getElementById("search").addEventListener("input", function(){
  let value = this.value.toLowerCase();
  let filtered = animals.filter(a => a.toLowerCase().includes(value));
  show(filtered);
});

// image upload
document.getElementById("upload").addEventListener("change", function(event){
  const file = event.target.files[0];

  if(file){
    const reader = new FileReader();

    reader.onload = function(e){
      document.getElementById("preview").innerHTML =
        `<img src="${e.target.result}">`;
    }

    reader.readAsDataURL(file);
  }
});

</script>

</body>
</html>
